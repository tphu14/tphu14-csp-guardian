# prometheus.yml – CSP Guardian scrape config
# Place in same directory as prometheus.exe and run:
#   prometheus.exe --config.file=prometheus.yml

global:
  scrape_interval:     15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'csp-guardian'
    static_configs:
      - targets: ['localhost:8000']
    metrics_path: /metrics
    scrape_interval: 10s